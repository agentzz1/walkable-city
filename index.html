<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>3D City Explorer</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.139.1/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.139.1/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body,#c{width:100%;height:100%;margin:0;overflow:hidden;font-family:system-ui,sans-serif}
#ui{position:absolute;top:10px;left:10px;z-index:100;background:rgba(0,0,0,.9);color:#fff;padding:14px;border-radius:8px;max-width:260px;font-size:12px;user-select:none}
h2{margin:0 0 10px;font-size:15px;color:#4ECDC4}
h3{margin:10px 0 6px;font-size:11px;color:#95A5A6}
p{margin:4px 0;font-size:10px;line-height:1.3}
select{width:100%;padding:5px;border-radius:3px;border:1px solid #555;background:#333;color:#fff;font-size:11px}
.b{padding:7px 14px;margin:2px;cursor:pointer;border:none;border-radius:4px;font-weight:700;font-size:11px}
.b.f{background:#2980b9;color:#fff}.b.w{background:#27ae60;color:#fff}.b.on{outline:2px solid #4ECDC4}
.x{background:rgba(255,255,255,.06);padding:6px;border-radius:4px;margin-top:6px}
.k{background:#444;padding:0 4px;border-radius:2px;font-family:monospace;font-size:9px}
#ld{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.95);color:#fff;z-index:200}
.sp{border:3px solid #333;border-top-color:#4ECDC4;border-radius:50%;width:28px;height:28px;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#fp{position:absolute;top:10px;right:10px;color:#4ECDC4;font-size:10px;background:rgba(0,0,0,.7);padding:3px 6px;border-radius:2px;z-index:100}
</style></head><body>
<div id="ld"><div class="sp"></div><p>Lade...</p></div>
<div id="fp">--</div><div id="c"></div>
<div id="ui">
<h2>3D City Explorer</h2>
<h3>Stadt</h3>
<select id="s"><option value="karlsruhe" selected>Karlsruhe</option><option value="berlin">Berlin</option><option value="paris">Paris</option><option value="london">London</option><option value="newyork">New York</option><option value="tokyo">Tokyo</option></select>
<h3>Modus</h3><button class="b f on" id="fb">Flug</button><button class="b w" id="wb">Gehen</button>
<div class="x" id="wi" style="display:none"><p><b>Gehen:</b> <span class="k">W</span><span class="k">A</span><span class="k">S</span><span class="k">D</span> bewegen · <span class="k">Maus</span> schauen · <span class="k">ESC</span> frei</p></div>
<div class="x" id="fi"><p><b>Flug:</b> Mausrad zoomen · Links drehen</p></div>
<h3>Status</h3><p id="t">Starte...</p>
</div>
<script>
Cesium.Ion.defaultAccessToken='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxNTBmYjlmZi0xZDZkLTQzODctYWRiNS0yYTI5YTQ1YmY5YzAiLCJpZCI6NDA2NDE5LCJpYXQiOjE3NzM5NjkwNjN9.Bbfc8OWsEul_A6mE2uB57NT_GUjAZCza3onN5ITFOJM';

const CT={karlsruhe:{x:8.4037,y:49.0069,z:400,n:'Karlsruhe'},berlin:{x:13.3777,y:52.5163,z:500,n:'Berlin'},paris:{x:2.2945,y:48.8584,z:500,n:'Paris'},london:{x:-.1276,y:51.5074,z:500,n:'London'},newyork:{x:-74.006,y:40.7128,z:500,n:'New York'},tokyo:{x:139.6917,y:35.6895,z:500,n:'Tokyo'}};
const $=id=>document.getElementById(id);
const ld=$('ld'),t=$('t'),fp=$('fp'),fb=$('fb'),wb=$('wb'),wi=$('wi'),fi=$('fi'),sel=$('s');

const v=new Cesium.Viewer('c',{terrain:Cesium.Terrain.fromWorldTerrain(),baseLayerPicker:0,geocoder:0,homeButton:0,sceneModePicker:0,navigationHelpButton:0,animation:0,timeline:0,fullscreenButton:1,requestRenderMode:1,maximumRenderTimeChange:1/0});
const sc=v.scene,g=sc.globe,cam=v.camera,cvs=v.canvas,ssc=sc.screenSpaceCameraController;

g.enableLighting=g.dynamicAtmosphereLighting=g.showGroundAtmosphere=g.translucency.enabled=sc.fog.enabled=sc.skyAtmosphere.show=sc.highDynamicRange=sc.postProcessStages.fxaa.enabled=0;
sc.msaaSamples=1;v.maximumScreenSpaceError=24;

// Prozeduraler Fassaden-Shader
const facadeShader=new Cesium.CustomShader({
uniforms:{
u_time:{type:Cesium.UniformType.FLOAT,value:0},
u_windowColor:{type:Cesium.UniformType.VEC3,value:new Cesium.Cartesian3(0.85,0.9,1.0)},
u_windowLit:{type:Cesium.UniformType.VEC3,value:new Cesium.Cartesian3(1.0,0.95,0.7)},
u_frameColor:{type:Cesium.UniformType.VEC3,value:new Cesium.Cartesian3(0.25,0.25,0.28)},
u_wallColors:{type:Cesium.UniformType.VEC3,value:new Cesium.Cartesian3(0.75,0.72,0.68)},
u_roofColor:{type:Cesium.UniformType.VEC3,value:new Cesium.Cartesian3(0.35,0.32,0.30)}
},
lightingModel:Cesium.LightingModel.PBR,
fragmentShaderText:`
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}

void fragmentMain(FragmentInput fsInput,inout czm_modelMaterial material){
vec3 pos=fsInput.attributes.positionMC;
vec3 normal=fsInput.attributes.normalMC;
float h=abs(pos.z);
float seed=hash(vec2(floor(pos.x*0.5),floor(pos.y*0.5)));

vec3 wallColor=u_wallColors;
wallColor+=noise(pos.xy*3.0)*0.08-0.04;
wallColor+=seed*0.12-0.06;

float isWall=step(0.5,abs(normal.z));
float isSide=step(0.5,abs(normal.x)+abs(normal.y))*(1.0-isWall);

float windowW=0.35;
float windowH=0.55;
float gapX=0.12;
float gapY=0.15;

vec2 wGrid=vec2(3.0,4.0+floor(h*0.8));
vec2 wUV=fract(pos.xy*vec2(wGrid.x/(1.0+windowW),wGrid.y/(1.0+windowH)));
float wFrame=step(gapX,wUV.x)*step(gapX,wUV.y)*step(wUV.x,1.0-gapX)*step(wUV.y,1.0-gapY);

float windowSeed=hash(floor(pos.xy*vec2(wGrid.x,wGrid.y)));
float lit=step(0.35,windowSeed);
float flicker=sin(u_time*2.0+windowSeed*6.28)*0.05+0.95;

vec3 wCol=mix(u_windowColor,u_windowLit,lit*flicker);
vec3 frameCol=u_frameColor;
vec3 windowFinal=mix(frameCol,wCol,wFrame);

float isWindowArea=isSide*step(0.8,mod(h,1.5)/1.5);
float groundFloor=1.0-step(0.8,mod(h,3.0)/3.0);
vec3 doorColor=u_frameColor*0.7;
vec3 groundDetail=mix(wallColor,doorColor,groundFloor*isSide*step(abs(fract(pos.x*2.0)-0.5),0.15)*step(abs(fract(h*0.8)-0.5),0.2));

vec3 roofCol=u_roofColor;
roofCol+=noise(pos.xy*5.0)*0.1;

float isRoof=step(0.5,max(0.0,normal.z));
vec3 finalColor=mix(mix(mix(wallColor,windowFinal,isWindowArea),groundDetail,1.0-isWindowArea),roofCol,isRoof);

finalColor=pow(finalColor,vec3(1.0/2.2));
material.diffuse=finalColor;
material.alpha=1.0;
}`
});

let bld;
async function loadBld(){
bld=await Cesium.createOsmBuildingsAsync();sc.primitives.add(bld);
bld.maximumScreenSpaceError=16;
bld.customShader=facadeShader;
t.textContent='Bereit';
}

setInterval(()=>{facadeShader.setUniform('u_time',performance.now()*0.001)},100);

function fly(k){const c=CT[k];cam.flyTo({destination:Cesium.Cartesian3.fromDegrees(c.x,c.y,c.z),orientation:{heading:0,pitch:Cesium.Math.toRadians(-15),roll:0},duration:1.5});st('→ '+c.n);setTimeout(()=>st(c.n),2e3)}

let stT;function st(x){clearTimeout(stT);stT=setTimeout(()=>t.textContent=x,50)}

let wk=0,lo=0,rf=0,lgc=0;const K={};const SP=4,SE=.002,GI=150;

document.onkeydown=e=>{K[e.code]=1;if(e.code==='Escape'&&wk){lo=0;document.exitPointerLock()}};
document.onkeyup=e=>{K[e.code]=0};
cvs.onclick=()=>wk&&!lo&&cvs.requestPointerLock();
document.onpointerlockchange=()=>{lo=document.pointerLockElement===cvs?1:0;wk&&st(lo?'Maus gesperrt':'Klick für Maus')};
document.onmousemove=e=>{if(!wk||!lo)return;cam.setView({orientation:{heading:cam.heading+e.movementX*SE,pitch:Cesium.Math.clamp(cam.pitch-e.movementY*SE,-1.4,1.4),roll:0}})};

function wLoop(){
if(!wk){rf=0;return}
let f=0,r=0;
K.KeyW&&(f+=SP);K.KeyS&&(f-=SP);K.KeyA&&(r-=SP);K.KeyD&&(r+=SP);
(f||r)&&(cam.moveForward(f),cam.moveRight(r));
const now=performance.now();
if(now-lgc>GI){lgc=now;const p=Cesium.Cartographic.fromCartesian(cam.positionWC),gh=g.getHeight(p)||0,th=gh+1.7;if(Math.abs(p.height-th)>.3)cam.position=Cesium.Cartesian3.fromRadians(p.longitude,p.latitude,th)}
rf=requestAnimationFrame(wLoop);
}

const sscc=(a,b,c,d,e)=>{ssc.enableRotate=a;ssc.enableTilt=b;ssc.enableLook=c;ssc.enableZoom=d;ssc.enableTranslate=e};

function fMode(){wk=0;lo=0;document.exitPointerLock();rf&&cancelAnimationFrame(rf);rf=0;sscc(1,1,1,1,1);fb.classList.add('on');wb.classList.remove('on');fi.style.display='';wi.style.display='none';st('Flug');v.requestRender()}
function wMode(){wk=1;const p=Cesium.Cartographic.fromCartesian(cam.positionWC),gh=g.getHeight(p)||0;cam.position=Cesium.Cartesian3.fromRadians(p.longitude,p.latitude,gh+1.7);cam.setView({orientation:{heading:cam.heading,pitch:-.3,roll:0}});sscc(0,0,0,0,0);wb.classList.add('on');fb.classList.remove('on');fi.style.display='none';wi.style.display='';st('Klick für Maus');lgc=0;rf=requestAnimationFrame(wLoop)}

fb.onclick=fMode;wb.onclick=wMode;sel.onchange=e=>fly(e.target.value);

let fc=0,lt=performance.now();
sc.postRender.addEventListener(()=>{fc++;const n=performance.now();if(n-lt>=1e3){fp.textContent=fc;fc=0;lt=n}});

(async()=>{try{await loadBld();fly('karlsruhe');setTimeout(()=>ld.remove(),1500)}catch(e){ld.innerHTML='<p style="color:red">'+e.message+'</p>'}})();
</script></body></html>
