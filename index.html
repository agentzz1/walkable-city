<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D City Explorer</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.139.1/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.139.1/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
html,body,#c{width:100%;height:100%;margin:0;overflow:hidden;font-family:system-ui,sans-serif}
#ui{position:absolute;top:10px;left:10px;z-index:100;background:rgba(0,0,0,.88);color:#fff;padding:16px;border-radius:10px;max-width:280px;font-size:13px}
#ui h2{margin:0 0 12px;font-size:16px;color:#4ECDC4}
#ui h3{margin:12px 0 8px;font-size:12px;color:#95A5A6}
#ui p{margin:6px 0;font-size:11px;line-height:1.4}
select{width:100%;padding:6px;border-radius:4px;border:1px solid #555;background:#333;color:#fff;font-size:12px}
.btn{padding:8px 16px;margin:3px 2px;cursor:pointer;border:none;border-radius:5px;font-weight:700;font-size:12px}
.btn.fly{background:linear-gradient(135deg,#3498db,#2980b9);color:#fff}
.btn.walk{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
.btn.on{box-shadow:0 0 10px rgba(255,255,255,.5)}
.box{background:rgba(255,255,255,.08);padding:8px;border-radius:5px;margin-top:8px}
.k{background:#444;padding:1px 5px;border-radius:2px;font-family:monospace;font-size:10px}
#ld{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.92);color:#fff;padding:24px;border-radius:10px;text-align:center;z-index:200}
.sp{border:3px solid #333;border-top:3px solid #4ECDC4;border-radius:50%;width:32px;height:32px;animation:sp 1s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
#fps{position:absolute;top:10px;right:10px;color:#4ECDC4;font-size:11px;background:rgba(0,0,0,.7);padding:4px 8px;border-radius:3px;z-index:100}
</style>
</head>
<body>
<div id="ld"><div class="sp"></div><h3>Lade Stadt...</h3></div>
<div id="fps">--</div>
<div id="c"></div>
<div id="ui">
<h2>3D City Explorer</h2>
<h3>Stadt</h3>
<select id="sel">
<option value="karlsruhe" selected>Karlsruhe</option>
<option value="berlin">Berlin</option>
<option value="paris">Paris</option>
<option value="london">London</option>
<option value="newyork">New York</option>
<option value="tokyo">Tokyo</option>
</select>
<h3>Modus</h3>
<button class="btn fly on" id="flyB">Flug</button>
<button class="btn walk" id="walkB">Gehen</button>
<div class="box" id="wi" style="display:none">
<p><b>Geh-Modus:</b></p>
<p><span class="k">W</span><span class="k">A</span><span class="k">S</span><span class="k">D</span> Bewegen</p>
<p><span class="k">Maus</span> Umschauen · <span class="k">ESC</span> Freigeben</p>
</div>
<div class="box" id="fi">
<p><b>Flug-Modus:</b></p>
<p>Mausrad Zoom · Links drehen</p>
</div>
<h3>Status</h3>
<p id="st">Starte...</p>
</div>
<script>
const T='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxNTBmYjlmZi0xZDZkLTQzODctYWRiNS0yYTI5YTQ1YmY5YzAiLCJpZCI6NDA2NDE5LCJpYXQiOjE3NzM5NjkwNjN9.Bbfc8OWsEul_A6mE2uB57NT_GUjAZCza3onN5ITFOJM';
Cesium.Ion.defaultAccessToken=T;

const CT={
karlsruhe:{lon:8.4037,lat:49.0069,h:400,n:'Karlsruhe'},
berlin:{lon:13.3777,lat:52.5163,h:500,n:'Berlin'},
paris:{lon:2.2945,lat:48.8584,h:500,n:'Paris'},
london:{lon:-.1276,lat:51.5074,h:500,n:'London'},
newyork:{lon:-74.006,lat:40.7128,h:500,n:'New York'},
tokyo:{lon:139.6917,lat:35.6895,h:500,n:'Tokyo'}
};

// DOM Cache
const $=id=>document.getElementById(id);
const el={ld:$('ld'),st:$('st'),fps:$('fps'),flyB:$('flyB'),walkB:$('walkB'),wi:$('wi'),fi:$('fi'),sel:$('sel')};

// Viewer - maximale Performance
const v=new Cesium.Viewer('c',{
terrain:Cesium.Terrain.fromWorldTerrain(),
baseLayerPicker:!1,geocoder:!1,homeButton:!1,sceneModePicker:!1,
navigationHelpButton:!1,animation:!1,timeline:!1,fullscreenButton:!0,
requestRenderMode:!0,maximumRenderTimeChange:1/0
});

const sc=v.scene,g=sc.globe;

// Scene Performance Flags
g.enableLighting=!1;
g.dynamicAtmosphereLighting=!1;
g.showGroundAtmosphere=!1;
g.translucency.enabled=!1;
sc.fog.enabled=!1;
sc.skyAtmosphere.show=!1;
sc.highDynamicRange=!1;
sc.postProcessStages.fxaa.enabled=!1;
sc.msaaSamples=1;

// Tile Performance
v.maximumScreenSpaceError=24;

// OSM Buildings
let bld=null;
async function loadBld(){
bld=await Cesium.createOsmBuildingsAsync();
sc.primitives.add(bld);
bld.maximumScreenSpaceError=16;
bld.style=new Cesium.Cesium3DTileStyle({
color:{conditions:[
["${feature['cesium#color']}!==undefined","color(${feature['cesium#color']})"],
["${building}==='apartments'","color('#E8A87C')"],
["${building}==='commercial'","color('#7EC8E3')"],
["${building}==='office'","color('#5B9BD5')"],
["${building}==='retail'","color('#F5D76E')"],
["${building}==='industrial'","color('#95A5A6')"],
["${building}==='hotel'","color('#BB8FCE')"],
["${building}==='hospital'","color('#E74C3C')"],
["${building}==='school'","color('#3498DB')"],
["${building}==='church'","color('#D4A574')"],
["${building}==='warehouse'","color('#BDC3C7')"],
["${building}==='residential'","color('#F0B27A')"],
["${building}==='house'","color('#F5CBA7')"],
["true","color('#D5DBDB')"]
]}});
el.st.textContent='Bereit';
}

// Kamera fliegen
function fly(k){
const c=CT[k];
v.camera.flyTo({
destination:Cesium.Cartesian3.fromDegrees(c.lon,c.lat,c.h),
orientation:{heading:0,pitch:Cesium.Math.toRadians(-15),roll:0},
duration:1.5
});
setStatus('Fliege zu '+c.n+'...');
setTimeout(()=>setStatus(c.n),2e3);
}

// Status mit Throttle
let stTmr=null;
function setStatus(t){
if(stTmr)clearTimeout(stTmr);
stTmr=setTimeout(()=>{el.st.textContent=t;stTmr=null},50);
}

// Walk State
let walk=!1,lock=!1,raf=null,lastGC=0;
const keys={};
const cvs=v.canvas;
const SPD=4,SENS=.002,GCI=150;

// Keyboard - single listener
document.addEventListener('keydown',e=>{
keys[e.code]=!0;
if(e.code==='Escape'&&walk){lock=!1;document.exitPointerLock()}
},!0);
document.addEventListener('keyup',e=>{keys[e.code]=!1},!0);

// Pointer Lock
cvs.addEventListener('click',()=>{if(walk&&!lock)cvs.requestPointerLock()});
document.addEventListener('pointerlockchange',()=>{
lock=document.pointerLockElement===cvs;
if(walk)setStatus(lock?'Maus gesperrt':'Klicken für Maus');
});

// Mouse - use passive
document.addEventListener('mousemove',e=>{
if(!walk||!lock)return;
const cam=v.camera;
cam.setView({orientation:{
heading:cam.heading+e.movementX*SENS,
pitch:Cesium.Math.clamp(cam.pitch-e.movementY*SENS,-1.4,1.4),
roll:0
}});
},{passive:!0});

// Walk Loop
function wLoop(){
if(!walk){raf=null;return}
const cam=v.camera;
let f=0,r=0;
if(keys.KeyW)f+=SPD;if(keys.KeyS)f-=SPD;
if(keys.KeyA)r-=SPD;if(keys.KeyD)r+=SPD;
if(f||r){cam.moveForward(f);cam.moveRight(r)}
const now=performance.now();
if(now-lastGC>GCI){
lastGC=now;
const pos=Cesium.Cartographic.fromCartesian(cam.positionWC);
const gh=g.getHeight(pos)||0;
const th=gh+1.7,ch=pos.height;
if(Math.abs(ch-th)>.3)
cam.position=Cesium.Cartesian3.fromRadians(pos.longitude,pos.latitude,th);
}
raf=requestAnimationFrame(wLoop);
}

// Mode Toggle
function flyMode(){
walk=!1;lock=!1;document.exitPointerLock();
if(raf){cancelAnimationFrame(raf);raf=null}
const c=sc.screenSpaceCameraController;
c.enableRotate=c.enableTilt=c.enableLook=c.enableZoom=c.enableTranslate=!0;
el.flyB.classList.add('on');el.walkB.classList.remove('on');
el.fi.style.display='block';el.wi.style.display='none';
setStatus('Flug-Modus');
v.requestRender();
}

function walkMode(){
walk=!0;
const cam=v.camera;
const pos=Cesium.Cartographic.fromCartesian(cam.positionWC);
const gh=g.getHeight(pos)||0;
cam.position=Cesium.Cartesian3.fromRadians(pos.longitude,pos.latitude,gh+1.7);
cam.setView({orientation:{heading:cam.heading,pitch:-.3,roll:0}});
const c=sc.screenSpaceCameraController;
c.enableRotate=c.enableTilt=c.enableLook=c.enableZoom=c.enableTranslate=!1;
el.walkB.classList.add('on');el.flyB.classList.remove('on');
el.fi.style.display='none';el.wi.style.display='block';
setStatus('Klicken für Maus');
lastGC=0;raf=requestAnimationFrame(wLoop);
}

el.flyB.onclick=flyMode;
el.walkB.onclick=walkMode;
el.sel.onchange=e=>fly(e.target.value);

// FPS - low overhead
let fc=0,lt=performance.now();
sc.postRender.addEventListener(()=>{
fc++;const now=performance.now();
if(now-lt>=1e3){el.fps.textContent=fc;fc=0;lt=now}
});

// Init
(async()=>{
try{
await loadBld();
fly('karlsruhe');
setTimeout(()=>{el.ld.style.display='none'},1500);
}catch(e){
el.ld.innerHTML='<h3>Fehler</h3><p>'+e.message+'</p>';
}
})();
</script>
</body>
</html>
